    '<details class="analysis-details secondary"><summary>继续展开：2025-2逐校对标与完整明细</summary><div class="analysis-details-body">'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">当前与主要学校的差距</h2><p class="section-sub">总分均分瑞安市前6；差值统一为“新纪元－对方”。</p></div><span class="section-badge">2025-2</span></div><article class="card">'+peerBars(g,6)+'</article></section>'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">五大学科差距</h2><p class="section-sub">切换查看均分、前20%人数和前20%比例。</p></div><div class="metric-toggle" data-gap-toggle="'+g+'"><button class="active" data-metric="scoreGap">均分差</button><button data-metric="top20HeadcountGap">前20%人数缺口</button><button data-metric="top20RateGapPP">前20%比例差</button></div></div><article class="card" id="delta-'+g+'">'+deltaChart(g,'scoreGap')+'</article></section>'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">总分层次结构图</h2><p class="section-sub">本校当前人数与达到瑞安市该分段比例第1名的折算目标人数。</p></div></div><article class="card">'+structureChart(g)+'</article></section>'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">选学校逐科对比</h2><p class="section-sub">切换任一学校，查看六项均分与前20%比例差。</p></div><div class="select-row"><label for="peer-select-'+g+'">对标学校</label><select class="control" id="peer-select-'+g+'">'+peerOptions(g)+'</select></div></div><article class="card"><div id="peer-compare-'+g+'">'+peerCompare(g,defaultPeer)+'</div><div class="quick-peers">'+totalPeers(g).slice(0,5).filter(function(r){return r.school!=='新纪元'}).map(function(r){return '<button class="quick-peer" data-grade="'+g+'" data-peer="'+ESC(r.school)+'">'+ESC(r.school)+'</button>'}).join('')+'</div></article></section>'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">历次五科与总分明细</h2><p class="section-sub">完整历史数据，可按学科筛选。</p></div></div><article class="card table-card"><div class="table-tools"><strong>'+g+'级历史明细</strong><select class="control" id="history-subject-'+g+'"><option>全部</option>'+SUBJECTS.map(function(s){return '<option>'+s+'</option>'}).join('')+'</select></div><div class="table-wrap"><table class="data-table"><thead><tr><th>考试</th><th>学科</th><th>均分</th><th>较上期</th><th>均分名次</th><th>前20%人数</th><th>前20%比例</th><th>前20%名次</th><th>前40%名次</th><th>前60%名次</th><th>前80%名次</th><th>实考/应考</th><th>参考差额</th><th>数据状态</th></tr></thead><tbody id="history-body-'+g+'">'+historyTableRows(g,'全部')+'</tbody></table></div></article></section>'+
    '<section class="section"><div class="section-head"><div><h2 class="section-title">2025-2逐校明细</h2><p class="section-sub">瑞安市全部学校，按均分名次排序。</p></div></div><article class="card table-card"><div class="table-tools"><div class="select-row"><select class="control" id="peer-subject-'+g+'">'+SUBJECTS.slice().reverse().map(function(s){return '<option>'+s+'</option>'}).join('')+'</select><input class="control" id="peer-search-'+g+'" placeholder="搜索学校名称"></div><span class="section-badge">本校行以青色高亮</span></div><div class="table-wrap"><table class="data-table"><thead><tr><th>均分名次</th><th>学校</th><th>实考</th><th>均分</th><th>本校-对方</th><th>前20%人数</th><th>前20%比例</th><th>比例名次</th><th>本校比例差%</th><th>标准分名次</th></tr></thead><tbody id="peer-body-'+g+'">'+peerTableRows(g,'总分','')+'</tbody></table></div></article></section></div></details>'+ 
    '<details class="notes"><summary>本页口径说明</summary><div class="notes-body"><ul><li>“均分差”按“新纪元均分－该指标排名第1学校均分”计算；“本校－对方”用于逐校对比。负数均表示新纪元落后。</li><li>人数缺口＝本校当前人数－向上取整（第1名比例×本校实考人数）。各学科人数缺口不可直接相加。</li><li>不同考试难度不同，历史均分只作描述；质量判断应同时看名次、比例、人数结构与参考口径。</li></ul></div></details><div class="source-foot">数据来源：2024-1、2024-2、2025-1、2025-2期末汇总与校际对比工作簿。</div>';
  }

  document.getElementById('view-overview').innerHTML=overviewHtml();
  document.getElementById('view-grade-2024').innerHTML=gradeHtml('2024');
  document.getElementById('view-grade-2025').innerHTML=gradeHtml('2025');

  var nextFrame=window.requestAnimationFrame||function(callback){callback()};
  function replaceWithMotion(element,html){element.classList.remove('is-updating');element.innerHTML=html;void element.offsetWidth;nextFrame(function(){element.classList.add('is-updating')})}

  function setRoute(route,replace){
    var valid=['overview','grade-2024','grade-2025'];if(valid.indexOf(route)<0)route='overview';
    document.querySelectorAll('[data-view]').forEach(function(v){v.hidden=v.dataset.view!==route;if(!v.hidden){v.classList.remove('is-entering');void v.offsetWidth;nextFrame(function(){v.classList.add('is-entering')})}});
    document.querySelectorAll('[data-route]').forEach(function(b){b.setAttribute('aria-selected',String(b.dataset.route===route))});
    if(replace) history.replaceState(null,'','#'+route); else if(location.hash!=='#'+route) history.pushState(null,'','#'+route);
    window.scrollTo({top:0,behavior:'instant'});
  }
  document.querySelectorAll('[data-route]').forEach(function(b){b.addEventListener('click',function(){setRoute(b.dataset.route,false)})});
  window.addEventListener('popstate',function(){setRoute(location.hash.slice(1)||'overview',true)});
  setRoute(location.hash.slice(1)||'overview',true);

  ['2024','2025'].forEach(function(g){
    var trendToggle=document.querySelector('[data-trend-toggle="'+g+'"]');
    trendToggle.addEventListener('click',function(e){var b=e.target.closest('button[data-trend-metric]');if(!b)return;trendToggle.querySelectorAll('button').forEach(function(x){x.classList.toggle('active',x===b)});replaceWithMotion(document.getElementById('trend-gap-'+g),gapTrendPanel(g,b.dataset.trendMetric))});
    document.querySelectorAll('[data-subject-trend-toggle="'+g+'"]').forEach(function(subjectToggle){subjectToggle.addEventListener('click',function(e){var b=e.target.closest('button[data-trend-metric]');if(!b)return;subjectToggle.querySelectorAll('button').forEach(function(x){x.classList.toggle('active',x===b)});var subjectName=subjectToggle.dataset.subject;replaceWithMotion(document.getElementById('subject-trend-'+g+'-'+SUBJECT_KEYS[subjectName]),gapTrendPanel(g,b.dataset.trendMetric,subjectName))})});
    var toggle=document.querySelector('[data-gap-toggle="'+g+'"]');
    toggle.addEventListener('click',function(e){var b=e.target.closest('button[data-metric]');if(!b)return;toggle.querySelectorAll('button').forEach(function(x){x.classList.toggle('active',x===b)});replaceWithMotion(document.getElementById('delta-'+g),deltaChart(g,b.dataset.metric))});
    var benchmarkCard=document.getElementById('benchmark-card-'+g);benchmarkCard.addEventListener('click',function(e){var button=e.target.closest('button[data-benchmark-subject]');if(!button)return;var selected=button.dataset.benchmarkSubject;benchmarkCard.querySelectorAll('[data-benchmark-row]').forEach(function(row){var active=row.dataset.benchmarkRow===selected;row.classList.toggle('is-selected',active);row.querySelector('button').setAttribute('aria-pressed',String(active))});var focus=document.getElementById('benchmark-focus-'+g);focus.classList.remove('is-ready');focus.innerHTML=benchmarkFocus(g,selected);void focus.offsetWidth;nextFrame(function(){focus.classList.add('is-ready')})});
    var peerSelect=document.getElementById('peer-select-'+g);peerSelect.value=gradeData(g).overview.firstSchool;
    peerSelect.addEventListener('change',function(){replaceWithMotion(document.getElementById('peer-compare-'+g),peerCompare(g,peerSelect.value))});
    document.querySelectorAll('.quick-peer[data-grade="'+g+'"]').forEach(function(b){b.addEventListener('click',function(){peerSelect.value=b.dataset.peer;peerSelect.dispatchEvent(new Event('change'))})});
    document.getElementById('history-subject-'+g).addEventListener('change',function(e){document.getElementById('history-body-'+g).innerHTML=historyTableRows(g,e.target.value)});
    var subject=document.getElementById('peer-subject-'+g),search=document.getElementById('peer-search-'+g),refresh=function(){document.getElementById('peer-body-'+g).innerHTML=peerTableRows(g,subject.value,search.value.trim())};
    subject.addEventListener('change',refresh);search.addEventListener('input',refresh);
  });
  </script>
</body>
